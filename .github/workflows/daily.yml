name: Daily Tracker

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC = 5am Chile
  workflow_dispatch:      # permite correrlo manualmente

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python tracker.py
      - name: Guardar datos
        run: |
          git config user.email "tracker@bot.com"
          git config user.name "Tracker Bot"
          git add data/
          git diff --staged --quiet || git commit -m "Data $(date +%Y-%m-%d)"
          git push
