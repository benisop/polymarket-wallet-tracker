name: Daily Tracker

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python tracker.py || true
      - name: Guardar datos
        run: |
          git config user.email "tracker@bot.com"
          git config user.name "Tracker Bot"
          git pull --rebase origin main || true
          git add data/ || true
          git diff --staged --quiet || git commit -m "Data $(date +%Y-%m-%d)"
          git push || true
